        <h1 class="tit">javaScript-Funciones & eventos </h1>
        <h2>javaScript contenido en etiqueta</h2>
        <button onclick="document.body.style.backgroundColor='lightgreen';"ondblclick="alert('hola mundo!!!');">cambia fondo</button>
        <h2>javaScript contenido en funciones</h2>
        <button id="btnColor">cambia fondo</button>
        <button id="btnSaludar">Saluda a todos</button>
        <script>
            /*Modo basico*/
            let button=document.getElementById("btnColor");
            function funColor_A(){
                document.body.style.backgroundColor='lightblue';
            }
            function funColor_B(){
                document.body.style.backgroundColor='pink';
            }
            button.addEventListener('click',funColor_A);
            button.addEventListener('dblclick',funColor_B);
            /*Modo optinizado*/
            document.getElementById("btnSaludar").addEventListener('click',()=>{
                alert("Hola alumnos de la Upslp...\nTengan un buen dia.\n:)");
            });
        </script>

        <h2>Almacenamiento</h2>
        <button onclick="aumentacontador_1()">contador No.1</button>
        <label>contador No.1: </label>
        <input type="number" id="varContador1" placeholder="(contador No.1)">
        <br>
        <button onclick="aumentacontador_2()">contador No.2</button>
        <label>contador No.2: </label>
        <input type="number" id="varContador2" placeholder="(contador No.2)">
        <script>
            function aumentacontador_1(){
            if(typeof(Storage)!="undefined"){
                if(localStorage.contador_1){
                    localStorage.contador_1++;
                }
                else{localStorage.contador_1=1;}
                document.getElementById('varContador1').value=localStorage.contador_1;

            }
            else{
                alert("Almacenamiento no soporta por el navegador...")}
            }
            
            function aumentacontador_2() {  
            if(typeof(Storage)!="undefined"){
                if(sessionStorage.contador_2){sessionStorage.contador_2++;}
                else{ sessionStorage.contador_2=1;}
                document.getElementById('varContador2').value=sessionStorage.contador_2;
            }
            else{
                alert("Almacenamiento no soporta por el navegador...")}
            }
                            
            
        </script>
